<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Code Agent</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        .chat-container {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            height: 90vh;

            display: flex;
            flex-direction: column;

            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            background: #020617;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
        }

        .message {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 70%;
            white-space: pre-line;
            /* ✅ important for list */
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #1e293b;
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            margin-left: 5px;
            padding: 10px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input id="textInput" placeholder="Type your task... (or say 'yes' / 'change location')" />

            <input type="file" id="audioUpload" accept="audio/*" />

            <button onclick="startRecording()">🎤</button>
            <button onclick="stopRecording()">⏹️</button>

            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        // ✅ Render messages properly
        function addMessage(text, sender) {
            let div = document.createElement("div");
            div.classList.add("message", sender);

            // ✅ Handle list of tasks
            if (Array.isArray(text)) {
                let formatted = text.map((t, i) => `${i + 1}. ${t}`).join("\n");
                div.innerText = formatted;
            } else {
                div.innerText = text;
            }

            document.getElementById("chat-box").appendChild(div);
            div.scrollIntoView();
        }

        // ✅ Main chat logic (NO BUTTONS)
        async function sendMessage() {
            let input = document.getElementById("textInput");
            let message = input.value.trim();

            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            let payload = {};

            // 🔥 Conversational control
            if (message.toLowerCase() === "yes") {
                payload = { approved: true };
            }
            else if (
                message.toLowerCase().includes("change") ||
                message.toLowerCase().includes("modify")
            ) {
                payload = { feedback: message };
            }
            else {
                payload = { message: message };
            }

            let res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            let data = await res.json();

            // ✅ Show tasks
            if (data.tasks) {
                addMessage(data.tasks, "bot");
            }

            // ✅ Show execution result
            if (data.file_path) {
                addMessage("✅ File created at: " + data.file_path, "bot");
            }
        }

        // 🎤 Start recording
        async function startRecording() {
            let stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();

            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            addMessage("🎤 Recording started...", "bot");
        }

        // ⏹️ Stop recording
        async function stopRecording() {
            mediaRecorder.stop();

            mediaRecorder.onstop = async () => {
                let blob = new Blob(audioChunks, { type: "audio/wav" });

                let formData = new FormData();
                formData.append("audio", blob, "recording.wav");

                let res = await fetch("/audio", {
                    method: "POST",
                    body: formData
                });

                let data = await res.json();

                addMessage(data.transcript, "user");

                // reuse same flow
                let chatRes = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: data.transcript })
                });

                let chatData = await chatRes.json();

                if (chatData.tasks) {
                    addMessage(chatData.tasks, "bot");
                }
            };
        }

        // 📁 Upload audio
        document.getElementById("audioUpload").addEventListener("change", async function () {
            let file = this.files[0];

            let formData = new FormData();
            formData.append("audio", file);

            let res = await fetch("/audio", {
                method: "POST",
                body: formData
            });

            let data = await res.json();

            addMessage(data.transcript, "user");

            let chatRes = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: data.transcript })
            });

            let chatData = await chatRes.json();

            if (chatData.tasks) {
                addMessage(chatData.tasks, "bot");
            }
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Code Agent</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        .chat-container {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            height: 90vh;

            display: flex;
            flex-direction: column;

            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            background: #020617;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 70%;
            white-space: pre-line;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #1e293b;
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            margin-left: 5px;
            padding: 10px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input id="textInput" placeholder="Type task OR say 'yes' OR 'change...'" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>

        function addMessage(text, sender) {
            let div = document.createElement("div");
            div.classList.add("message", sender);

            if (Array.isArray(text)) {
                div.innerText = text.map((t, i) => `${i + 1}. ${t}`).join("\n");
            } else if (typeof text === "object") {
                div.innerText = JSON.stringify(text, null, 2);
            } else if (text) {
                div.innerText = text;
            } else {
                div.innerText = "⚠️ Empty response";
            }

            document.getElementById("chat-box").appendChild(div);
            div.scrollIntoView();
        }

        async function sendMessage() {
            let input = document.getElementById("textInput");
            let message = input.value.trim();

            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            // ✅ ALWAYS include message
            let payload = {
                message: message
            };

            // ✅ Add extra flags WITHOUT removing message
            if (message.toLowerCase() === "yes") {
                payload.approved = true;
            }
            else if (
                message.toLowerCase().includes("change") ||
                message.toLowerCase().includes("modify")
            ) {
                payload.feedback = message;
            }

            console.log("SENDING:", payload); // 🔥 debug

            try {
                let res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                let data = await res.json();

                console.log("API RESPONSE:", data);

                if (data.tasks && data.tasks.length > 0) {
                    addMessage(data.tasks, "bot");
                }
                else if (data.file_path) {
                    addMessage("✅ File created at: " + data.file_path, "bot");
                }
                else if (data.code) {
                    addMessage(data.code, "bot");
                }
                else {
                    addMessage("⚠️ No response from server", "bot");
                }

            } catch (error) {
                console.error("ERROR:", error);
                addMessage("❌ Server error", "bot");
            }
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Code Agent</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        .chat-container {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            background: #020617;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 70%;
            white-space: pre-line;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #1e293b;
            color: white;
        }

        button {
            margin-left: 5px;
            padding: 10px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input id="textInput" placeholder="Type OR click mic..." />
            <button onclick="toggleRecording()">🎤</button>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        function addMessage(text, sender) {
            let div = document.createElement("div");
            div.classList.add("message", sender);

            if (Array.isArray(text)) {
                div.innerText = text.map((t, i) => `${i + 1}. ${t}`).join("\n");
            } else {
                div.innerText = text || "⚠️ Empty response";
            }

            document.getElementById("chat-box").appendChild(div);
            div.scrollIntoView();
        }

        // 🎤 START / STOP RECORDING
        async function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.start();
                isRecording = true;

                addMessage("🎤 Recording... Click again to stop", "bot");

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

            } catch (err) {
                addMessage("❌ Mic permission denied", "bot");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;

            mediaRecorder.onstop = async () => {
                let blob = new Blob(audioChunks, { type: "audio/wav" });

                let formData = new FormData();
                formData.append("audio", blob, "recording.wav");

                try {
                    let res = await fetch("/chat", {
                        method: "POST",
                        body: formData
                    });

                    let data = await res.json();

                    if (data.error) {
                        addMessage("❌ " + data.error, "bot");
                        return;
                    }

                    if (data.message) {
                        addMessage(data.message, "user");
                    }

                    if (data.tasks) {
                        addMessage(data.tasks, "bot");
                    }

                } catch (err) {
                    addMessage("❌ Voice error", "bot");
                }
            };
        }

        // 💬 TEXT CHAT (UNCHANGED)
        async function sendMessage() {
            let input = document.getElementById("textInput");
            let message = input.value.trim();

            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            let res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            let data = await res.json();

            if (data.error) {
                addMessage("❌ " + data.error, "bot");
                return;
            }

            if (data.tasks) {
                addMessage(data.tasks, "bot");
            }
        }

    </script>

</body>

</html>
